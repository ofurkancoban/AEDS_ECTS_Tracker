<script>
  const COUNTER_KEY_PREFIX = "ects-tracker-app-b7f2-";
  const COUNTER_BASE = "https://countapi.mileshilliard.com/api/v1";

  window.storage = {
    get: async (key, shared) => {
      if (shared) {
        const res = await fetch(`${COUNTER_BASE}/get/${encodeURIComponent(COUNTER_KEY_PREFIX + key)}`);
        if (res.status === 404) return null;
        if (!res.ok) throw new Error("shared counter unavailable");
        const data = await res.json();
        return data && data.value != null ? { key, value: String(data.value), shared: true } : null;
      }
      const raw = localStorage.getItem(key);
      return raw === null ? null : { key, value: raw };
    },
    set: async (key, value, shared) => {
      if (shared) {
        const res = await fetch(`${COUNTER_BASE}/hit/${encodeURIComponent(COUNTER_KEY_PREFIX + key)}`);
        if (!res.ok) throw new Error("shared counter unavailable");
        const data = await res.json();
        return { key, value: String(data.value), shared: true };
      }
      try {
        var prev = localStorage.getItem(key);
        if (prev !== null && prev !== value) {
          var bk = key + "::backups";
          var ring = [];
          try { ring = JSON.parse(localStorage.getItem(bk) || "[]"); } catch (e) {}
          ring.push({ t: Date.now(), value: prev });
          while (ring.length > 5) ring.shift();
          localStorage.setItem(bk, JSON.stringify(ring));
        }
      } catch (e) { /* backups are best-effort */ }
      localStorage.setItem(key, value);
      return { key, value };
    },
    delete: async (key, shared) => {
      if (shared) return { key, deleted: false, shared: true };
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    list: async (prefix) => {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix };
    },
  };
</script>
<script>
  (function () {
    function parseCSV(text) {
      var rows = [], row = [], field = "", inQ = false;
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (inQ) {
          if (ch === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false;
          } else field += ch;
        } else if (ch === '"') inQ = true;
        else if (ch === ",") { row.push(field); field = ""; }
        else if (ch === "\n" || ch === "\r") {
          if (ch === "\r" && text[i + 1] === "\n") i++;
          row.push(field); field = "";
          if (row.length > 1 || row[0] !== "") rows.push(row);
          row = [];
        } else field += ch;
      }
      if (field !== "" || row.length) { row.push(field); rows.push(row); }
      return rows;
    }
    try {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "catalog.csv", false);
      xhr.send(null);
      if (xhr.status !== 200 && xhr.status !== 0) return;
      var rows = parseCSV(xhr.responseText);
      if (rows.length < 2) return;
      var head = rows[0];
      var cat = { lists: {}, languages: {}, contactHours: {}, professors: {},
        examTypes: {}, skills: {}, links: {}, offering: {}, offeredSemesters: {}, extraSemesters: {}, codeLookup: {},
        compulsoryList: [], compulsoryByCat: {} };
      for (var r = 1; r < rows.length; r++) {
        var rec = {};
        for (var c = 0; c < head.length; c++) rec[head[c]] = rows[r][c] || "";
        var code = rec.code, category = rec.category;
        if (!code || !category) continue;
        (cat.lists[category] = cat.lists[category] || []).push(code + " - " + rec.name);
        if (rec.language) cat.languages[code] = rec.language;
        if (rec.contact_hours !== "") cat.contactHours[code] = parseInt(rec.contact_hours, 10);
        if (rec.professor) cat.professors[code] = rec.professor;
        if (rec.exam_type) cat.examTypes[code] = rec.exam_type;
        if (rec.skills) cat.skills[code] = rec.skills;
        if (rec.studip_link) cat.links[code] = rec.studip_link;
        if (rec.offering) cat.offering[code] = rec.offering;
        if (rec.semesters_offered) cat.offeredSemesters[code] = rec.semesters_offered.split(";");
        if (rec.extra_semesters) cat.extraSemesters[code] = rec.extra_semesters.split(";");
        var nrm = function (x) { return x.toLowerCase().replace(/[\u2019\u00B4\u0060]/g, "'"); };
        cat.codeLookup[nrm(code + " - " + rec.name)] = code;
        cat.codeLookup[nrm(rec.name)] = code;
        cat.codeLookup[code.toLowerCase()] = code;
        if (rec.compulsory) {
          cat.compulsoryList.push(code);
          (cat.compulsoryByCat[category] = cat.compulsoryByCat[category] || []).push(code);
        }
      }
      cat.lastModified = xhr.getResponseHeader("Last-Modified") || "";
      try {
        var codes = [];
        for (var r2 = 1; r2 < rows.length; r2++) {
          var ci = head.indexOf("code");
          if (ci >= 0 && rows[r2][ci]) codes.push(rows[r2][ci]);
        }
        var seen = JSON.parse(localStorage.getItem("catalogCodesSeen") || "null");
        cat.newCodes = Array.isArray(seen)
          ? codes.filter(function (c2) { return seen.indexOf(c2) < 0; })
          : [];
        localStorage.setItem("catalogCodesSeen", JSON.stringify(codes));
      } catch (e) { cat.newCodes = []; }
      window.EXTERNAL_CATALOG = cat;
    } catch (e) { /* offline or file:// - fall back to the built-in catalog */ }
  })();
</script>
<script>
  // Allow text selection inside inputs/textareas that live in draggable
  // course cards: temporarily disable the ancestor's draggable attribute
  // while the mouse is down on an editable element.
  document.addEventListener("mousedown", function (e) {
    var t = e.target;
    if (!t || !(t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
    var card = t.closest && t.closest('[draggable="true"]');
    if (!card) return;
    card.setAttribute("draggable", "false");
    var restore = function () {
      card.setAttribute("draggable", "true");
      document.removeEventListener("mouseup", restore);
    };
    document.addEventListener("mouseup", restore);
  }, true);
</script>

ription/546fd89d63664bcc9e608d09c7e11e9d",inf535:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/dd9e1e5325f0f97108259acbe2ad1208",inf536:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/2aed0ed9b1c90089c8b843b17326e247",inf604:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/9ae4582c724860df178d6d70ef14e8a2",inf607:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/ed6907f40dc6178876de3aa205c475c5",inf040:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/b3bb9f0f67338720f2bdb4017d3ff28c",inf962:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/35248b0991166c6a2b0cd82ad0883134",inf510:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/0fbfb6fa3c907bf16805a693f9a40e15",wir842:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/34afca9bdce7fbe3ca7dd07fd92a9d4d",wir843:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/4c5e571a3e01d7aefff33062c917236f",wir896:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/822b462bfc288150e0fa4fa8160293d4",wir898:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/edb9a9e13b5b95f4bae2e82b9af6c28b",wir921:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/805f32b8e80ef8cad8e818c0713eb712",wir806:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/4a65ddc0b7428215b9acb9918cb8f2cb",inf109:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/dd20ebbf7d80669f132ed4912b0c903b",mam:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/31f90d236b60c5d610dc9c8273a25923"},wh={wir821:"After successful completion of this module, students describe and interpret empirical facts about international trade, understand motives for international trade, set up and solve canonical models of international trade, analyze data on international trade, evaluate the welfare effects of changes in trade costs and trade policies, and synthesize and communicate insights from the academic literature on international trade.",wir823:"After successful completion of this module, students know empirical facts about multinational firms and foreign direct investment, understand different motives for multinational firm activity, understand the trade-offs involved in firms' integration vs. outsourcing decision, are able to set up and solve models of multinational firms, are able to obtain and analyze data on multinational firm activity, and know the current state of empirical evidence on various aspects of multinational firm activity.",wir873:"The students are able to: develop an empirical research project, collect the required data, carry out an econometric analysis, and interpret, discuss and present the results.",wir874:"Students understand the importance of incentive systems for economic processes and can analyze the effects of incentive systems; have a firm knowledge in game theory and contract theory, and can address questions in the context of scientific discussion; are able to apply methods from game theory and contract theory largely independently to the analysis of situations in which agents interact strategically; are able to design incentive schemes, on their own and in teams, and to acquire knowledge on their own for this purpose, and to present their results and defend them in the scientific discourse.",wir876:"Students have the opportunity to take an economics module of their choice (worth 6 CP) at the master's level. This can also take place at another university or during studies abroad. Students are required to: independently engage with a topic using scientific methods, independently research and make use of current academic literature, and integrate their topic into an academic discussion.",wir878:"The students are able to understand sources of market failures and government failures, understand taxing and spending activities of governments, understand the distinction between normative and positive perspectives in the evaluation of government policy, apply economic methods to current issues in public economics, and present their research result in the form of written papers and oral presentations.",wir901:"Know and be able to apply fundamental concepts and figures of thought in environmental economics; be able to analyse and evaluate environmental problems and solution approaches; practice scientific methods and the ability to discuss; be able to classify environmental economics in the context of interdisciplinary sustainability research.",wir889:"Students will develop the ability to: conceptually analyze environmental problems using the principles of microeconomic theory; collect, organize, and manage data from diverse sources for econometric analysis; formulate theoretical models to describe environmental issues and derive key measures, such as attribute valuations; select appropriate econometric methods for quantitative estimation; and conduct empirical analyses of environmental problems and critically interpret and assess the results.",wir890:"This course aims at giving students an understanding of reasons, objectives and economic instruments for climate policy. Students first get acquainted with the natural science of the climate where anthropogenic greenhouse gas emissions constitute the source of man-made climate change. The latter is then explained from an economic perspective as a global environmental externality calling for environmental regulation to avoid substantial market failures. Game theoretic analysis of international negotiations and agreements provides key insights about the fundamental problems of free-riding and efficient climate policy design. Beyond theoretical propositions, the lecture will critically discuss past and contemporary climate policies such as the Kyoto Protocol, the Paris Agreement, or the EU Emissions Trading System.",wir893:"The students are able to: identify and discuss empirical challenges in research on developing countries; understand, summarize, and discuss recent research studies in development economics; evaluate strategies to reach sustainable economic development discussed in the public and politics; participate in a discussion on the topic, developing a well-grounded position and problem solving strategy; present current research and discuss it verbally and in written form; and identify gaps in the literature on developing countries.",wir895:"Be able to conceptually understand, critically evaluate, and apply methods used by economists to study the behaviour of firms, consumers, and their interaction.",wir922:"Students have the opportunity to take an economics module of their choice (worth 6 CP) at the master's level. This can also take place at another university or during studies abroad. Students are required to: independently engage with a topic using scientific methods, independently research and make use of current academic literature, and integrate their topic into an academic discussion.",wir751:"According to the specification of the foreign university.",wir752:"According to the specification of the foreign university.",wir753:"According to the specification of the foreign university.",wir760:"During the course work students will learn how to set up computable general equilibrium (CGE) models step-by-step using the GAMS software (General Algebraic Modeling System) and apply them to actual policy issues of broader interest.",wir875:"With successful completion of the course, students shall: be aware of and be able to evaluate quantitative forecasting methods; be able to select adequate methods in relevant fields of application, like time series and classification analysis; and be able to run computer-aided analyses and to interpret the results properly.",wir887:"Be able to conceptually understand, critically evaluate, and apply methods used in the statistical analysis of data.",wir888:"This course provides an introduction to some fundamental geo-processing operations using ArcGIS that are most relevant for economics research. The broad term GIS encompasses a set of tools (both software and hardware) to collect, store, visualize and analyze spatial data from the real world. GIS techniques allow economists to use data on geography and weather as sources of exogenous variation for estimating the causal impact of a wide range of treatments (e.g., infrastructure, mass media, slave trade, land suitability for agriculture, and terrain ruggedness). Satellite images from the earth's surface, which can be analyzed with geo-processing tools in GIS, allow economists to construct geo-spatial indicators (e.g., temporal changes in the intensity of night-time light and patterns of deforestation) that more closely reflect the local actors and underlying mechanisms of interest.",wir891:"With successful completion of the course, students shall be able to analyze complex empirical data sets, like aggregated data, privacy constrained data, distance information, distributions, tables, symbolic or granular data. Students will also learn to handle issues of big data challenges: large number of cases or variables, unknown dependencies, redundancy, missing values, small or no variance. In this course students will learn theoretical aspects of complex data analysis, as well as practical applications for real data sets with statistical software packages.",wir892:"Computer-based simulations play a key role for quantifying the economic impacts of policy reforms. Among numerical simulation methods, computable partial equilibrium (CPE) models are widely used in applied economic analysis. These models build on microeconomic theory for describing supply and demand behavior of economic agents on markets. Students will learn how to program such models and apply them to the impact assessment of trade, fiscal, or environmental policies.",wir894:"Be able to conceptually understand and apply key empirical methods used by any economist (and other professionals) in the evaluation of policies. Be able to perform and critically evaluate an empirical analysis.",wir897:"This course provides an introduction to spatial econometrics modelling that are particularly appropriate to analyse real-world phenomenons of spatial dependence among geographically proximate units. With successful completion of the course, students shall be able to identify spatial diffusion processes across various empirical settings and to have a thorough understanding in the application, estimation, and interpretation of the relevant spatial regression models.",inf535:`After successful completion of the course, students should have acquired the ability to master the presented methods in theory and practice. The students should be able to recognize and model corresponding optimization and data analysis problems themselves and to apply the methods unerringly.
Professional competence: recognise optimisation problems; implement simple algorithms of heuristic optimisation; critically discuss solutions and selection of methods; deepen previous knowledge of analysis and linear algebra.
Methodological competence: deepen programming skills; apply modelling skills; learn about the relation between problem class and method selection.
Social competence: cooperatively implement content introduced in lecture; evaluate own solutions and compare them with those of their peers.
Self-competence: evaluate own skills with reference to peers; realize personal limitations; adapt own problem solving approaches with reference to required method competences.`,inf536:`In the lecture "Convolutional Neural Networks" you will learn the basics of Convolutional Neural Networks, from methodological understanding to implementation.
Professional competence: will learn Deep Learning expertise, which are essential qualifications as AI experts and Data Scientists.
Methodological competence: learn the methods mentioned as well as the implementation in Python, NumPy and Keras.
Social competence: are encouraged to discuss the taught content in groups and work together to implement the programming tasks in the exercises.
Self-competence: are guided to conduct independent research on advanced methods as the teaching field changes dynamically.`,inf530:`Students understand core concepts, methods and application areas of artificial intelligence, including classical learning methods (KNN, k-means, neural networks) as well as modern approaches such as transformers, large language models and prompting, and are familiar with evolutionary methods such as genetic algorithms.
Professional competence: explain core concepts of AI, machine learning, neural networks and genetic algorithms; distinguish supervised, unsupervised and reinforcement learning and their typical use cases; describe transformers, large language models, prompting techniques and generative AI models; analyze strengths and weaknesses of different AI methods for concrete problems.
Methodological competence: implement AI models in Python using libraries such as scikit-learn, Keras and Hugging Face; evaluate models using appropriate metrics (accuracy, precision, recall, F1) and interpret results; implement simple genetic algorithms and Q-learning, and apply deep learning for function approximation in reinforcement learning; develop and test prompting strategies.
Social competence: work together on practical AI projects, discuss successes and failed attempts critically in a team, and present solutions to a target audience.
Self-competence: reflect on the use of AI methods in their own projects, recognize ethical implications of AI systems such as bias, fairness and transparency, and develop awareness of the opportunities, limits and responsibilities of generative AI.`,inf604:`Current module provides basics of business intelligence with focus on enterprises and strong emphasis on data warehousing technologies. Students of the course are provided with knowledge, which reflects current research and development in a data analytic domain.
Professional competence: name and recognize the role of business intelligence as part of daily business process; being able to analyse advantages and disadvantages of different approaches and methods of the data analytics and being able to apply them in simple case studies; obtain theoretical knowledge about data collection and modelling processes, including most applicable approaches and best practices.
Methodological competence: being able to execute typical tasks of business intelligence, and also being able to deepen knowledge on different approaches and methods; gain hands on experience and being able to understand advantages and disadvantages of different methods and being able to use obtained knowledge in most efficient ways.
Social competence: build solutions based on case studies given to the group, for example solving the issue of a factless fact table; discuss solutions on a technical level; present obtained case studies solutions as part of the exercises.
Self-competence: critically review provided data and information.`,inf607:`Current module provides advanced business intelligence, data science with focus on enterprises and strong emphasis on big data and data analytics. Students of the course are provided with knowledge, which reflects current research and development in a data analytics domain.
Professional competence: name and recognize the role of data analytics / data science as part of a daily business process in a particular company; able to organize from management perspective a data analytics project; being able to analyse advantages and disadvantages of different approaches and methods of the data analytics and being able to apply them in simple case studies; obtain theoretical knowledge about data collection and modelling processes, including state of the art approaches and available best practices.
Methodological competence: being able to execute typical tasks of data analytics, and also being able to proceed deeper with respect to different approaches and methods; gain hands on experience and being able to understand advantages and disadvantages of different methods and being able to use obtained knowledge.
Social competence: build solutions based on case studies given to the group, for example design of regression model based on provided dataset; discuss solutions on a technical level; present obtained case studies solutions as part of the exercises.
Self-competence: critically review provided offered information.`,inf040:`The module teaches fundamentals from the field of Data Science, covering purposes, challenges, and common best practices.
Professional competences: have knowledge of basic concepts, problems and solution approaches from the field of Data Science; are able to justify the choice of specific data analysis methods for a given problem; include possible imponderables in the analysis when evaluating analysis results.
Methodological competences: are able to translate questions from a specific domain into a feasible analysis; work on Data Science tasks to expand their understanding of the different approaches and methods.
Social competences: discuss approaches and problems encountered in smaller and larger groups.
Self competences: reflect on their actions when identifying possible solutions and critically question their own results.`,inf962:`Graduates of the module have acquired a deeper understanding of basic theories and techniques in computer science and can classify problems that arise. This enables students to structure and model simple tasks from their subject area using computer science, to design approaches to solutions and to estimate the effort required to solve them. They have a basic understanding of the design and use of relational databases. This course provides students with fundamental computational problem-solving skills necessary to complete subsequent courses in computer science.
Professional competences: name the basic concepts of von Neumann's computer architecture; describe concepts of the computational representation of information and their limits; use basic data structures and algorithms and reason about their complexity; model simple problems with formal concepts such as automata and formal languages; design simple relational databases and identify the advantages of database-based storage.
Methodological competences: analyze problems from their area of application; design appropriate solutions for simple problems using the Python programming language and estimate the effort required to execute them; design simple object-oriented models; use a simple IDE and implement scripts in Python; discuss alternative computational representations of data and problems and draw informed conclusions from them.
Social competences: present and discuss their solutions in an interdisciplinary team; develop solutions to simple problems cooperatively in a team.
Self-competences: critically reflect on fundamental design decisions in algorithms and data structures; deepen their time management skills.`,inf510:`The students will learn different approaches to integrate distributed facilities, the regulatory framework, relevant standards and architecture concepts of energy management systems and will be able to apply this knowledge.
Professional competence: develop and evaluate IT-architectures for energy management systems; model objects of this domain appropriately; model energy information systems; realise and differentiate advanced tasks of decentralised energy management systems.
Methodological competence: identify problems of energy management, analyse these problems systematically and provide solutions; apply different simulation approaches of decentralised plants and consumers.
Social competence: discuss solutions for energy management systems in the group; develop use cases in teams; present self-developed solutions.
Self-competence: reflect their actions with regard to structuring and decomposing systems; reflect their own use of power as a limited resource.`,wir842:"Upon completion of the module students will be able to explain the role financial institutions play in financial markets based on economic theory. They will have a sound knowledge of institutional and regulatory conditions under which financial institutions operate today, and they will be able to critically assess respective developments in the financial sector. Moreover, they will have developed a sound understanding of how banks are managed in a competitive environment.",wir843:"The aim of the course is to provide students with a thorough knowledge of how to identify, classify, measure, and manage different types of financial business risks. In particular, we will discuss the properties and potential applications of derivatives in financial risk management. Upon completion of this module students will have a sound understanding of the concept of risk management, and will be able to distinguish different types of financial risks and risk management approaches; will be able to devise hedging strategies, arbitrage strategies, and speculative strategies using financial derivatives such as futures contracts, forward contracts, options, and swaps; will be able to consistently apply valuation models to determine theoretical prices of financial derivatives; and will be able to assess limitations of financial derivatives in risk management.",wir886:"The students should: know basic definitions, trends and application areas of digitalization; be able to assess the economic effects of digitalization; understand corporate strategies and business models in the context of digital transformation; know how companies should design processes and structures to promote digitalization in organizations; have an overview of social, legal and ethical aspects of digitalization; assess the environmental impact of digitalization; evaluate digital products, services and business models using ethical and sustainable guidelines; and independently develop proposals for the integration of ethical, social and ecological criteria in digitalization projects and processes.",wir896:"In der zum Modul geh\xF6rigen Vorlesung werden vor allem formalanalytische Modelle erarbeitet, mit denen Produktionsprobleme beschrieben und im Rahmen der Modellannahmen optimiert werden k\xF6nnen. Hiermit sollen die Studierenden eine Kompetenz zur Analyse realer Produktionsprozesse erwerben, mit Hilfe derer sie diese nicht nur verstehen, sondern idealerweise auch verbessern k\xF6nnen. Im begleitenden Seminar werden mithilfe von in Gruppen verfassten Hausarbeiten aktuelle Fragestellungen und Konzepte zu den formalanalytischen Modellen aufgearbeitet und bewertet. Das Seminar baut erg\xE4nzend zur Vorlesung auf konzeptioneller und empirischer Forschung auf. Hiermit lernen die Studierenden wissenschaftliche Diskurse zu praktisch relevanten und nur schwer modellierbaren Herausforderungen des Operations Managements kennen. Ferner werden die F\xE4higkeiten zum wissenschaftlichen Arbeiten, zur Teamarbeit und zum Pr\xE4sentieren vor gro\xDFen Gruppen trainiert.",wir898:"The students should know and understand basic concepts, instruments and theories in the context of corporate sustainability and corporate social responsibility; be able to apply conceptual frameworks to analyze and critically question the sustainability of companies; and develop options to improve the sustainability of companies and derive recommendations for their implementation in practice.",wir899:"In der zum Modul geh\xF6rigen Vorlesung werden vor allem formalanalytische Modelle erarbeitet, mit denen Probleme in Wertsch\xF6pfungsketten beschrieben und im Rahmen der Modellannahmen optimiert werden k\xF6nnen. Hiermit sollen die Studierenden eine Kompetenz zur unternehmens\xFCbergreifenden Analyse der gesamten Wertsch\xF6pfungskette (Supply Chain) erwerben, mit Hilfe derer sie diese nicht nur verstehen, sondern idealerweise auch verbessern k\xF6nnen. Im begleitenden Seminar werden mithilfe von in Gruppen verfassten Hausarbeiten aktuelle Fragestellungen und Diskussionen im Supply Chain Management aufgearbeitet und bewertet. Das Seminar baut erg\xE4nzend zur Vorlesung auf konzeptioneller und empirischer Forschung auf. Hiermit lernen die Studierenden wissenschaftliche Diskurse zu praktisch relevanten und nur schwer modellierbaren Herausforderungen des Supply Chain Managements kennen. Ferner werden die F\xE4higkeiten zum wissenschaftlichen Arbeiten, zur Teamarbeit und zum Pr\xE4sentieren vor gro\xDFen Gruppen trainiert.",wir921:"By focusing on sustainability from an intra- and inter-organizational perspective, this module aims to equip students with an in-depth knowledge of the sustainability-related challenges and problems within supply chain management and suggests some tools for managing the same. It further seeks to capacitate students to understand and analyze the trade-offs and conflicts of targets within sustainable supply chain management. The content is closely linked to the latest research in the field, providing a theoretical understanding (within the lecture) while using real-world case examples (within the seminar) to develop a practical understanding simultaneously. Students will be able to connect theory with practice and get a taste of real-life corporate scenarios or lay a foundation for possible master theses. Further, working in groups will help students brush up their team management skills, and the final report shall accustom them to the intricacies of scientific writing.",wir806:"The students are familiar with the effects of digitalisation with its chances and risks in European and German private law and, in particular, consumer law. They obtain knowledge of specific areas of digitalised private law and consumer law with particular relevance for their future professional practice, are able to solve consumer law cases in a goal-oriented way, are able to find approaches for legal problems as well as recognise liability risks and how to deal with them, and are, in contract negotiations, able to recognise the requirements for regulation and to evaluate its consequences.",inf109:`Professional competence: describe concepts, languages and architectures of database systems; discuss state-of-the-art database research topics; analyse information processing tasks and implement solutions appropriately.
