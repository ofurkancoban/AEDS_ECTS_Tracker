<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Applied Economics and Data Science Credit Tracker</title>
<style>
  html, body { margin: 0; padding: 0; }
  #root { min-height: 100vh; }
</style>
<script>
  const COUNTAPI_NAMESPACE = "ects-tracker-app-b7f2";

  window.storage = {
    get: async (key, shared) => {
      if (shared) {
        const res = await fetch(`https://api.countapi.xyz/get/${COUNTAPI_NAMESPACE}/${encodeURIComponent(key)}`);
        if (!res.ok) throw new Error("shared counter unavailable");
        const data = await res.json();
        return data && data.value != null ? { key, value: String(data.value), shared: true } : null;
      }
      const raw = localStorage.getItem(key);
      return raw === null ? null : { key, value: raw };
    },
    set: async (key, value, shared) => {
      if (shared) {
        const res = await fetch(`https://api.countapi.xyz/hit/${COUNTAPI_NAMESPACE}/${encodeURIComponent(key)}`);
        if (!res.ok) throw new Error("shared counter unavailable");
        const data = await res.json();
        return { key, value: String(data.value), shared: true };
      }
      localStorage.setItem(key, value);
      return { key, value };
    },
    delete: async (key, shared) => {
      if (shared) return { key, deleted: false, shared: true };
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    list: async (prefix) => {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix };
    },
  };
</script>

denburg.de/dispatch.php/shared/modul/description/4c5e571a3e01d7aefff33062c917236f",wir896:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/822b462bfc288150e0fa4fa8160293d4",wir898:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/edb9a9e13b5b95f4bae2e82b9af6c28b",wir921:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/805f32b8e80ef8cad8e818c0713eb712",wir806:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/4a65ddc0b7428215b9acb9918cb8f2cb",inf109:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/dd20ebbf7d80669f132ed4912b0c903b",mam:"https://elearning.uni-oldenburg.de/dispatch.php/shared/modul/description/31f90d236b60c5d610dc9c8273a25923"},pg={wir821:"After successful completion of this module, students describe and interpret empirical facts about international trade, understand motives for international trade, set up and solve canonical models of international trade, analyze data on international trade, evaluate the welfare effects of changes in trade costs and trade policies, and synthesize and communicate insights from the academic literature on international trade.",wir823:"After successful completion of this module, students know empirical facts about multinational firms and foreign direct investment, understand different motives for multinational firm activity, understand the trade-offs involved in firms' integration vs. outsourcing decision, are able to set up and solve models of multinational firms, are able to obtain and analyze data on multinational firm activity, and know the current state of empirical evidence on various aspects of multinational firm activity.",wir873:"The students are able to: develop an empirical research project, collect the required data, carry out an econometric analysis, and interpret, discuss and present the results.",wir874:"Students understand the importance of incentive systems for economic processes and can analyze the effects of incentive systems; have a firm knowledge in game theory and contract theory, and can address questions in the context of scientific discussion; are able to apply methods from game theory and contract theory largely independently to the analysis of situations in which agents interact strategically; are able to design incentive schemes, on their own and in teams, and to acquire knowledge on their own for this purpose, and to present their results and defend them in the scientific discourse.",wir876:"Students have the opportunity to take an economics module of their choice (worth 6 CP) at the master's level. This can also take place at another university or during studies abroad. Students are required to: independently engage with a topic using scientific methods, independently research and make use of current academic literature, and integrate their topic into an academic discussion.",wir878:"The students are able to understand sources of market failures and government failures, understand taxing and spending activities of governments, understand the distinction between normative and positive perspectives in the evaluation of government policy, apply economic methods to current issues in public economics, and present their research result in the form of written papers and oral presentations.",wir901:"Know and be able to apply fundamental concepts and figures of thought in environmental economics; be able to analyse and evaluate environmental problems and solution approaches; practice scientific methods and the ability to discuss; be able to classify environmental economics in the context of interdisciplinary sustainability research.",wir889:"Students will develop the ability to: conceptually analyze environmental problems using the principles of microeconomic theory; collect, organize, and manage data from diverse sources for econometric analysis; formulate theoretical models to describe environmental issues and derive key measures, such as attribute valuations; select appropriate econometric methods for quantitative estimation; and conduct empirical analyses of environmental problems and critically interpret and assess the results.",wir890:"This course aims at giving students an understanding of reasons, objectives and economic instruments for climate policy. Students first get acquainted with the natural science of the climate where anthropogenic greenhouse gas emissions constitute the source of man-made climate change. The latter is then explained from an economic perspective as a global environmental externality calling for environmental regulation to avoid substantial market failures. Game theoretic analysis of international negotiations and agreements provides key insights about the fundamental problems of free-riding and efficient climate policy design. Beyond theoretical propositions, the lecture will critically discuss past and contemporary climate policies such as the Kyoto Protocol, the Paris Agreement, or the EU Emissions Trading System.",wir893:"The students are able to: identify and discuss empirical challenges in research on developing countries; understand, summarize, and discuss recent research studies in development economics; evaluate strategies to reach sustainable economic development discussed in the public and politics; participate in a discussion on the topic, developing a well-grounded position and problem solving strategy; present current research and discuss it verbally and in written form; and identify gaps in the literature on developing countries.",wir895:"Be able to conceptually understand, critically evaluate, and apply methods used by economists to study the behaviour of firms, consumers, and their interaction.",wir922:"Students have the opportunity to take an economics module of their choice (worth 6 CP) at the master's level. This can also take place at another university or during studies abroad. Students are required to: independently engage with a topic using scientific methods, independently research and make use of current academic literature, and integrate their topic into an academic discussion.",wir751:"According to the specification of the foreign university.",wir752:"According to the specification of the foreign university.",wir753:"According to the specification of the foreign university.",wir760:"During the course work students will learn how to set up computable general equilibrium (CGE) models step-by-step using the GAMS software (General Algebraic Modeling System) and apply them to actual policy issues of broader interest.",wir875:"With successful completion of the course, students shall: be aware of and be able to evaluate quantitative forecasting methods; be able to select adequate methods in relevant fields of application, like time series and classification analysis; and be able to run computer-aided analyses and to interpret the results properly.",wir887:"Be able to conceptually understand, critically evaluate, and apply methods used in the statistical analysis of data.",wir888:"This course provides an introduction to some fundamental geo-processing operations using ArcGIS that are most relevant for economics research. The broad term GIS encompasses a set of tools (both software and hardware) to collect, store, visualize and analyze spatial data from the real world. GIS techniques allow economists to use data on geography and weather as sources of exogenous variation for estimating the causal impact of a wide range of treatments (e.g., infrastructure, mass media, slave trade, land suitability for agriculture, and terrain ruggedness). Satellite images from the earth's surface, which can be analyzed with geo-processing tools in GIS, allow economists to construct geo-spatial indicators (e.g., temporal changes in the intensity of night-time light and patterns of deforestation) that more closely reflect the local actors and underlying mechanisms of interest.",wir891:"With successful completion of the course, students shall be able to analyze complex empirical data sets, like aggregated data, privacy constrained data, distance information, distributions, tables, symbolic or granular data. Students will also learn to handle issues of big data challenges: large number of cases or variables, unknown dependencies, redundancy, missing values, small or no variance. In this course students will learn theoretical aspects of complex data analysis, as well as practical applications for real data sets with statistical software packages.",wir892:"Computer-based simulations play a key role for quantifying the economic impacts of policy reforms. Among numerical simulation methods, computable partial equilibrium (CPE) models are widely used in applied economic analysis. These models build on microeconomic theory for describing supply and demand behavior of economic agents on markets. Students will learn how to program such models and apply them to the impact assessment of trade, fiscal, or environmental policies.",wir894:"Be able to conceptually understand and apply key empirical methods used by any economist (and other professionals) in the evaluation of policies. Be able to perform and critically evaluate an empirical analysis.",wir897:"This course provides an introduction to spatial econometrics modelling that are particularly appropriate to analyse real-world phenomenons of spatial dependence among geographically proximate units. With successful completion of the course, students shall be able to identify spatial diffusion processes across various empirical settings and to have a thorough understanding in the application, estimation, and interpretation of the relevant spatial regression models.",inf535:`After successful completion of the course, students should have acquired the ability to master the presented methods in theory and practice. The students should be able to recognize and model corresponding optimization and data analysis problems themselves and to apply the methods unerringly.
Professional competence: recognise optimisation problems; implement simple algorithms of heuristic optimisation; critically discuss solutions and selection of methods; deepen previous knowledge of analysis and linear algebra.
Methodological competence: deepen programming skills; apply modelling skills; learn about the relation between problem class and method selection.
Social competence: cooperatively implement content introduced in lecture; evaluate own solutions and compare them with those of their peers.
Self-competence: evaluate own skills with reference to peers; realize personal limitations; adapt own problem solving approaches with reference to required method competences.`,inf536:`In the lecture "Convolutional Neural Networks" you will learn the basics of Convolutional Neural Networks, from methodological understanding to implementation.
Professional competence: will learn Deep Learning expertise, which are essential qualifications as AI experts and Data Scientists.
Methodological competence: learn the methods mentioned as well as the implementation in Python, NumPy and Keras.
Social competence: are encouraged to discuss the taught content in groups and work together to implement the programming tasks in the exercises.
Self-competence: are guided to conduct independent research on advanced methods as the teaching field changes dynamically.`,inf604:`Current module provides basics of business intelligence with focus on enterprises and strong emphasis on data warehousing technologies. Students of the course are provided with knowledge, which reflects current research and development in a data analytic domain.
Professional competence: name and recognize the role of business intelligence as part of daily business process; being able to analyse advantages and disadvantages of different approaches and methods of the data analytics and being able to apply them in simple case studies; obtain theoretical knowledge about data collection and modelling processes, including most applicable approaches and best practices.
Methodological competence: being able to execute typical tasks of business intelligence, and also being able to deepen knowledge on different approaches and methods; gain hands on experience and being able to understand advantages and disadvantages of different methods and being able to use obtained knowledge in most efficient ways.
Social competence: build solutions based on case studies given to the group, for example solving the issue of a factless fact table; discuss solutions on a technical level; present obtained case studies solutions as part of the exercises.
Self-competence: critically review provided data and information.`,inf607:`Current module provides advanced business intelligence, data science with focus on enterprises and strong emphasis on big data and data analytics. Students of the course are provided with knowledge, which reflects current research and development in a data analytics domain.
Professional competence: name and recognize the role of data analytics / data science as part of a daily business process in a particular company; able to organize from management perspective a data analytics project; being able to analyse advantages and disadvantages of different approaches and methods of the data analytics and being able to apply them in simple case studies; obtain theoretical knowledge about data collection and modelling processes, including state of the art approaches and available best practices.
Methodological competence: being able to execute typical tasks of data analytics, and also being able to proceed deeper with respect to different approaches and methods; gain hands on experience and being able to understand advantages and disadvantages of different methods and being able to use obtained knowledge.
Social competence: build solutions based on case studies given to the group, for example design of regression model based on provided dataset; discuss solutions on a technical level; present obtained case studies solutions as part of the exercises.
Self-competence: critically review provided offered information.`,inf040:`The module teaches fundamentals from the field of Data Science, covering purposes, challenges, and common best practices.
Professional competences: have knowledge of basic concepts, problems and solution approaches from the field of Data Science; are able to justify the choice of specific data analysis methods for a given problem; include possible imponderables in the analysis when evaluating analysis results.
Methodological competences: are able to translate questions from a specific domain into a feasible analysis; work on Data Science tasks to expand their understanding of the different approaches and methods.
Social competences: discuss approaches and problems encountered in smaller and larger groups.
Self competences: reflect on their actions when identifying possible solutions and critically question their own results.`,inf962:`Graduates of the module have acquired a deeper understanding of basic theories and techniques in computer science and can classify problems that arise. This enables students to structure and model simple tasks from their subject area using computer science, to design approaches to solutions and to estimate the effort required to solve them. They have a basic understanding of the design and use of relational databases. This course provides students with fundamental computational problem-solving skills necessary to complete subsequent courses in computer science.
Professional competences: name the basic concepts of von Neumann's computer architecture; describe concepts of the computational representation of information and their limits; use basic data structures and algorithms and reason about their complexity; model simple problems with formal concepts such as automata and formal languages; design simple relational databases and identify the advantages of database-based storage.
Methodological competences: analyze problems from their area of application; design appropriate solutions for simple problems using the Python programming language and estimate the effort required to execute them; design simple object-oriented models; use a simple IDE and implement scripts in Python; discuss alternative computational representations of data and problems and draw informed conclusions from them.
Social competences: present and discuss their solutions in an interdisciplinary team; develop solutions to simple problems cooperatively in a team.
Self-competences: critically reflect on fundamental design decisions in algorithms and data structures; deepen their time management skills.`,inf510:`The students will learn different approaches to integrate distributed facilities, the regulatory framework, relevant standards and architecture concepts of energy management systems and will be able to apply this knowledge.
Professional competence: develop and evaluate IT-architectures for energy management systems; model objects of this domain appropriately; model energy information systems; realise and differentiate advanced tasks of decentralised energy management systems.
Methodological competence: identify problems of energy management, analyse these problems systematically and provide solutions; apply different simulation approaches of decentralised plants and consumers.
Social competence: discuss solutions for energy management systems in the group; develop use cases in teams; present self-developed solutions.
Self-competence: reflect their actions with regard to structuring and decomposing systems; reflect their own use of power as a limited resource.`,wir842:"Upon completion of the module students will be able to explain the role financial institutions play in financial markets based on economic theory. They will have a sound knowledge of institutional and regulatory conditions under which financial institutions operate today, and they will be able to critically assess respective developments in the financial sector. Moreover, they will have developed a sound understanding of how banks are managed in a competitive environment.",wir843:"The aim of the course is to provide students with a thorough knowledge of how to identify, classify, measure, and manage different types of financial business risks. In particular, we will discuss the properties and potential applications of derivatives in financial risk management. Upon completion of this module students will have a sound understanding of the concept of risk management, and will be able to distinguish different types of financial risks and risk management approaches; will be able to devise hedging strategies, arbitrage strategies, and speculative strategies using financial derivatives such as futures contracts, forward contracts, options, and swaps; will be able to consistently apply valuation models to determine theoretical prices of financial derivatives; and will be able to assess limitations of financial derivatives in risk management.",wir886:"The students should: know basic definitions, trends and application areas of digitalization; be able to assess the economic effects of digitalization; understand corporate strategies and business models in the context of digital transformation; know how companies should design processes and structures to promote digitalization in organizations; have an overview of social, legal and ethical aspects of digitalization; assess the environmental impact of digitalization; evaluate digital products, services and business models using ethical and sustainable guidelines; and independently develop proposals for the integration of ethical, social and ecological criteria in digitalization projects and processes.",wir896:"In der zum Modul geh\xF6rigen Vorlesung werden vor allem formalanalytische Modelle erarbeitet, mit denen Produktionsprobleme beschrieben und im Rahmen der Modellannahmen optimiert werden k\xF6nnen. Hiermit sollen die Studierenden eine Kompetenz zur Analyse realer Produktionsprozesse erwerben, mit Hilfe derer sie diese nicht nur verstehen, sondern idealerweise auch verbessern k\xF6nnen. Im begleitenden Seminar werden mithilfe von in Gruppen verfassten Hausarbeiten aktuelle Fragestellungen und Konzepte zu den formalanalytischen Modellen aufgearbeitet und bewertet. Das Seminar baut erg\xE4nzend zur Vorlesung auf konzeptioneller und empirischer Forschung auf. Hiermit lernen die Studierenden wissenschaftliche Diskurse zu praktisch relevanten und nur schwer modellierbaren Herausforderungen des Operations Managements kennen. Ferner werden die F\xE4higkeiten zum wissenschaftlichen Arbeiten, zur Teamarbeit und zum Pr\xE4sentieren vor gro\xDFen Gruppen trainiert.",wir898:"The students should know and understand basic concepts, instruments and theories in the context of corporate sustainability and corporate social responsibility; be able to apply conceptual frameworks to analyze and critically question the sustainability of companies; and develop options to improve the sustainability of companies and derive recommendations for their implementation in practice.",wir899:"In der zum Modul geh\xF6rigen Vorlesung werden vor allem formalanalytische Modelle erarbeitet, mit denen Probleme in Wertsch\xF6pfungsketten beschrieben und im Rahmen der Modellannahmen optimiert werden k\xF6nnen. Hiermit sollen die Studierenden eine Kompetenz zur unternehmens\xFCbergreifenden Analyse der gesamten Wertsch\xF6pfungskette (Supply Chain) erwerben, mit Hilfe derer sie diese nicht nur verstehen, sondern idealerweise auch verbessern k\xF6nnen. Im begleitenden Seminar werden mithilfe von in Gruppen verfassten Hausarbeiten aktuelle Fragestellungen und Diskussionen im Supply Chain Management aufgearbeitet und bewertet. Das Seminar baut erg\xE4nzend zur Vorlesung auf konzeptioneller und empirischer Forschung auf. Hiermit lernen die Studierenden wissenschaftliche Diskurse zu praktisch relevanten und nur schwer modellierbaren Herausforderungen des Supply Chain Managements kennen. Ferner werden die F\xE4higkeiten zum wissenschaftlichen Arbeiten, zur Teamarbeit und zum Pr\xE4sentieren vor gro\xDFen Gruppen trainiert.",wir921:"By focusing on sustainability from an intra- and inter-organizational perspective, this module aims to equip students with an in-depth knowledge of the sustainability-related challenges and problems within supply chain management and suggests some tools for managing the same. It further seeks to capacitate students to understand and analyze the trade-offs and conflicts of targets within sustainable supply chain management. The content is closely linked to the latest research in the field, providing a theoretical understanding (within the lecture) while using real-world case examples (within the seminar) to develop a practical understanding simultaneously. Students will be able to connect theory with practice and get a taste of real-life corporate scenarios or lay a foundation for possible master theses. Further, working in groups will help students brush up their team management skills, and the final report shall accustom them to the intricacies of scientific writing.",wir806:"The students are familiar with the effects of digitalisation with its chances and risks in European and German private law and, in particular, consumer law. They obtain knowledge of specific areas of digitalised private law and consumer law with particular relevance for their future professional practice, are able to solve consumer law cases in a goal-oriented way, are able to find approaches for legal problems as well as recognise liability risks and how to deal with them, and are, in contract negotiations, able to recognise the requirements for regulation and to evaluate its consequences.",inf109:`Professional competence: describe concepts, languages and architectures of database systems; discuss state-of-the-art database research topics; analyse information processing tasks and implement solutions appropriately.
Methodological competence: propose concrete processing requirements for special application classes; assess the consequences of techniques and approaches; perform supervised research in the field of information systems; analyse and reflect complex information system requirements; realize information demands and accordingly gather aim-oriented information.
Social competencies: solve problems partially in small groups; present solution proposals in front of the exercise group; discuss their different solution proposals within the exercise group.
