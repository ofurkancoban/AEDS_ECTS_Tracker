name: Update module catalog

on:
  schedule:
    # every day at 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch catalog from Stud.IP
        run: python3 scripts/fetch_catalog.py catalog.csv | tee scrape.log

      - name: Commit if changed
        run: |
          if git diff --quiet -- catalog.csv; then
            echo "No catalog changes, skipping commit."
            exit 0
          fi
          MSG=$(python3 scripts/commit_message.py scrape.log)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.csv
          git commit -m "$MSG"
          git push
